<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gform Filler Ultra</title>
    <!-- Use local-friendly fonts -->
    <style>
        :root {
            --primary: #0d9af2;
            --bg-dark: #101b22;
            --glass: rgba(24, 41, 52, 0.85);
            --border: rgba(49, 83, 104, 0.5);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }
        body {
            width: 400px;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(13, 154, 242, 0.2);
            position: relative;
        }
        header {
            padding: 20px;
            border-bottom: 1px solid rgba(13, 154, 242, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-box {
            background: rgba(13, 154, 242, 0.1);
            padding: 8px;
            border-radius: 8px;
            color: var(--primary);
            font-weight: bold;
        }
        h1 {
            margin: 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #0d9af2 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        main {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .label-wrap {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        label {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        #saveStatus {
            font-size: 10px;
            color: var(--primary);
        }
        textarea {
            width: 100%;
            height: 160px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 13px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(13, 154, 242, 0.2);
        }
        .btn-main {
            background: linear-gradient(90deg, #0d9af2, #06b6d4);
            color: white;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(13, 154, 242, 0.3);
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }
        .status-msg {
            text-align: center;
            font-size: 11px;
            min-height: 14px;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ctrl-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            cursor: pointer;
        }
        footer {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sync-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--text-muted);
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 6px #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-wrap">
                <div class="logo-box">ULTRA</div>
                <h1>Gform Filler</h1>
            </div>
        </header>
        <main>
            <div>
                <div class="label-wrap">
                    <label>Reference Context</label>
                    <span id="saveStatus">READY</span>
                </div>
                <textarea id="contextInput" placeholder="Paste data here... AI will map it automatically."></textarea>
            </div>
            <button id="startButton" class="btn-main">Start Perfect Fill</button>
            <div id="status" class="status-msg"></div>
            <div class="controls">
                <div class="ctrl-box" id="clearBtn">
                    <span>Clear Data</span>
                    <span>🗑️</span>
                </div>
                <div class="ctrl-box">
                    <span>AI Sync</span>
                    <span style="color: #22c55e">ON</span>
                </div>
            </div>
        </main>
        <footer>
            <div class="sync-wrap">
                <div class="dot"></div>
                <span>Connected to Cloudflare AI</span>
            </div>
            <span style="font-size: 9px; opacity: 0.5;">v4.2.0</span>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
