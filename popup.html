<!DOCTYPE html>
<html>

<head>
    <title>Gform Filler</title>
    <style>
        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            color: #202124;
        }

        h3 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        p.desc {
            font-size: 12px;
            color: #5f6368;
            margin: 0 0 12px 0;
        }

        textarea {
            width: 100%;
            height: 120px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #dadce0;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
        }

        textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1557b0;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button.secondary {
            background-color: #f8f9fa;
            color: #1a73e8;
            border: 1px solid #1a73e8;
        }

        button.secondary:hover {
            background-color: #e8f0fe;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            color: #5f6368;
            text-align: center;
            min-height: 16px;
        }
    </style>
</head>

<body>
    <h3><span class="header-icon">G</span> Gform Filler</h3>
    <p class="desc">Agent context to automatically answer form questions.</p>
    <textarea id="contextInput"
        placeholder="Enter context data here...&#10;e.g.,&#10;Name: John Doe&#10;Role: Developer&#10;Experience: 5 years"></textarea>
    <div class="btn-group">
        <button id="saveButton" class="secondary">Save Data</button>
        <button id="startButton">Start Filling</button>
    </div>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>

</html>
